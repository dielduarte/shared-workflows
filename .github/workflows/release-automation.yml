name: Release Automation

on:
  workflow_call:

jobs:
  guards:
    name: Guards (consumer hook)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/guards

  build:
    name: Build (consumer hook)
    needs: guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/build

  release:
    name: Release (consumer hook)
    needs: build
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/release

  notify:
    name: Notify
    needs: release
    runs-on: ubuntu-latest
    steps:
      - run: echo "Notification would be sent here"
