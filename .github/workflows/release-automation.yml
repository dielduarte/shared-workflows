name: Release Automation

on:
  workflow_call:

jobs:
  check-changesets:
    name: Check changesets
    runs-on: ubuntu-latest
    outputs:
      has_changesets: ${{ steps.check.outputs.result }}
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - id: check
        run: |
          if find .changeset -name '*.md' -not -name 'README.md' 2>/dev/null | grep -q .; then
            echo "result=true" >> $GITHUB_OUTPUT
            echo "✓ Changesets found — proceeding"
          else
            echo "result=false" >> $GITHUB_OUTPUT
            echo "No changesets — skipping release"
          fi

  ci:
    name: CI (consumer hook)
    needs: check-changesets
    if: needs.check-changesets.outputs.has_changesets == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/ci

  bump:
    name: Bump versions
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - name: Log pending changesets
        run: |
          echo "┌─────────────────────────────────────────┐"
          echo "│           Pending changesets             │"
          echo "└─────────────────────────────────────────┘"
          for f in .changeset/*.md; do
            [ "$f" = ".changeset/README.md" ] && continue
            # extract bump type and packages from frontmatter
            packages=$(awk '/^---$/{p++; next} p==1' "$f" | grep -v '^---')
            summary=$(awk '/^---$/{p++; next} p==2' "$f")
            echo ""
            echo "📦 $packages"
            echo "   $summary"
          done
          echo ""
      - run: echo "→ pnpm run version would run here"

  approve:
    name: Await approval
    needs: bump
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "✓ Approved — proceeding to release"

  release:
    name: Build + publish (consumer hook)
    needs: approve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/release

  notify:
    name: Notify
    needs: release
    runs-on: ubuntu-latest
    steps:
      - run: echo "→ Notification would be sent here"
