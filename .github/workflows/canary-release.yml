name: Canary Release

on:
  workflow_call:

jobs:
  check-prerelease:
    name: Check for pre-release version (consumer hook)
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - id: check
        uses: ./.github/actions/check-prerelease

  release:
    name: Release canary (consumer hook)
    needs: check-prerelease
    if: needs.check-prerelease.outputs.is_prerelease == 'true'
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/release
