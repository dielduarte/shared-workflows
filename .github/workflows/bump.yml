name: Bump

on:
  workflow_call:

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bump
        uses: ./.github/actions/bump
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
