name: Bump

on:
  workflow_call:

jobs:
  check-changesets:
    name: Check for changesets
    runs-on: ubuntu-latest
    outputs:
      has_changesets: ${{ steps.check.outputs.result }}
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - id: check
        run: |
          COUNT=$(find .changeset -name "*.md" ! -name "README.md" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$COUNT" -gt "0" ]; then
            echo "result=true" >> $GITHUB_OUTPUT
            echo "Found $COUNT changeset(s) - proceeding with bump"
          else
            echo "result=false" >> $GITHUB_OUTPUT
            echo "No changesets found - skipping bump"
          fi

  bump:
    name: Bump (consumer hook)
    needs: check-changesets
    if: needs.check-changesets.outputs.has_changesets == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Bump
        uses: ./.github/actions/bump
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
